<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Progres Hafalan Juz 30</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #0F3D32;
    --ink-deep: #0A2B23;
    --gold: #C9A227;
    --gold-light: #E4C55E;
    --parchment: #FBF4E1;
    --parchment-deep: #F3E9CC;
    --maroon: #A33A2E;
    --amber: #C97C1F;
    --sage: #3F7D58;
    --silver: #9AA1A6;
    --ink-text: #2B241A;
    --radius: 14px;
    --radius-sm: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    -webkit-text-size-adjust: 100%;
    scroll-behavior: smooth;
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: var(--ink-text);
    background:
      radial-gradient(ellipse at 20% 0%, rgba(201,162,39,0.12), transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(201,162,39,0.08), transparent 50%),
      linear-gradient(170deg, var(--ink) 0%, var(--ink-deep) 100%);
    background-attachment: fixed;
    min-height: 100dvh;
    padding: clamp(0.75rem, 3vw, 2rem) clamp(0.5rem, 4vw, 1rem);
    position: relative;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Geometric star pattern overlay */
  body::before{
    content:"";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.04;
    background-image:
      linear-gradient(30deg, var(--gold) 12%, transparent 12.5%, transparent 87%, var(--gold) 87.5%, var(--gold)),
      linear-gradient(150deg, var(--gold) 12%, transparent 12.5%, transparent 87%, var(--gold) 87.5%, var(--gold)),
      linear-gradient(30deg, var(--gold) 12%, transparent 12.5%, transparent 87%, var(--gold) 87.5%, var(--gold)),
      linear-gradient(150deg, var(--gold) 12%, transparent 12.5%, transparent 87%, var(--gold) 87.5%, var(--gold));
    background-size: 60px 104px;
    background-position: 0 0, 0 0, 30px 52px, 30px 52px;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    background: var(--parchment);
    background-image: linear-gradient(180deg, var(--parchment) 0%, var(--parchment-deep) 100%);
    padding: clamp(1.25rem, 5vw, 2.25rem) clamp(1rem, 5vw, 1.75rem) clamp(1rem, 4vw, 1.75rem);
    border-radius: clamp(14px, 3vw, 20px);
    position: relative;
    z-index: 1;
    box-shadow:
      0 20px 50px -15px rgba(0,0,0,0.5),
      0 0 0 1px rgba(201,162,39,0.3);
    border: 1px solid rgba(201,162,39,0.45);
    animation: containerIn 0.6s ease-out both;
  }

  @keyframes containerIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Illuminated corner ornaments */
  .corner {
    position: absolute;
    width: clamp(28px, 6vw, 46px);
    height: clamp(28px, 6vw, 46px);
    opacity: 0.75;
    z-index: 2;
  }
  .corner svg { width: 100%; height: 100%; display: block; }
  .corner.tl { top: 6px; left: 6px; }
  .corner.tr { top: 6px; right: 6px; transform: scaleX(-1); }
  .corner.bl { bottom: 6px; left: 6px; transform: scaleY(-1); }
  .corner.br { bottom: 6px; right: 6px; transform: scale(-1,-1); }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 0.15rem;
    position: relative;
    z-index: 1;
  }
  #homeBtn {
    border: none;
    background: var(--ink);
    width: 44px;
    height: 44px;
    min-width: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  #homeBtn:active { transform: scale(0.92); }
  @media (hover: hover) { #homeBtn:hover { transform: translateY(-2px); background: var(--ink-deep); } }
  #homeBtn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  #homeBtn img { width: 44px; height: 44px; object-fit: contain; }

  h2 {
    flex: 1;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: clamp(1.35rem, 5.5vw, 1.9rem);
    color: var(--ink);
    letter-spacing: 0.01em;
    line-height: 1.2;
  }

  .subtitle{
    text-align: center;
    font-size: clamp(0.72rem, 2.5vw, 0.85rem);
    color: #7a6f57;
    margin: 0 0 clamp(1rem, 3vw, 1.5rem);
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* ── Select ── */
  label {
    display: block;
    margin-top: 0.25rem;
    font-weight: 700;
    font-size: clamp(0.75rem, 2.8vw, 0.85rem);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink);
  }
  .select-wrap {
    position: relative;
    margin-top: 0.4rem;
  }
  select {
    width: 100%;
    padding: clamp(0.7rem, 2.5vw, 0.8rem) 2.5rem clamp(0.7rem, 2.5vw, 0.8rem) clamp(0.85rem, 3vw, 1rem);
    font-size: clamp(0.95rem, 3.5vw, 1.05rem);
    font-family: inherit;
    font-weight: 600;
    color: var(--ink-text);
    background: #fff;
    border: 1.5px solid var(--parchment-deep);
    border-radius: var(--radius-sm);
    appearance: none;
    cursor: pointer;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
    min-height: 48px;
  }
  select:focus-visible {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,162,39,0.25);
  }
  @media (hover: hover) { select:hover { border-color: var(--gold); } }
  .select-wrap::after{
    content: "";
    position: absolute;
    right: clamp(0.75rem, 3vw, 1rem);
    top: 50%;
    width: 8px;
    height: 8px;
    border-right: 2px solid var(--ink);
    border-bottom: 2px solid var(--ink);
    transform: translateY(-65%) rotate(45deg);
    pointer-events: none;
  }

  /* ── Status Banner ── */
  .status-banner {
    margin-top: 0.75rem;
    padding: 0.6rem 0.85rem;
    border-radius: 8px;
    font-size: clamp(0.82rem, 3vw, 0.9rem);
    font-weight: 600;
    display: none;
    line-height: 1.4;
  }
  .status-banner.show { display: flex; align-items: center; gap: 0.5rem; }
  .status-banner.loading { background: rgba(201,162,39,0.15); color: #7a5f13; }
  .status-banner.error { background: rgba(163,58,46,0.12); color: var(--maroon); }
  .status-banner .spinner {
    width: 16px; height: 16px; min-width: 16px;
    border: 2px solid rgba(122,95,19,0.3);
    border-top-color: #7a5f13;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Progress ── */
  .progress {
    margin-top: clamp(0.9rem, 3vw, 1.25rem);
    text-align: center;
    animation: fadeUp 0.4s ease-out both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .progress-text {
    font-weight: 700;
    margin-bottom: 0.5rem;
    font-size: clamp(0.85rem, 3.2vw, 0.98rem);
    line-height: 1.5;
  }
  .progress-text.red { color: var(--maroon); }
  .progress-text.green { color: var(--sage); }
  .progress-bar {
    height: clamp(22px, 4vw, 28px);
    background: var(--parchment-deep);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.10);
  }
  .progress-bar-inner {
    height: 100%;
    background: var(--maroon);
    width: 0%;
    transition: width 0.8s cubic-bezier(.2,.8,.2,1), background 0.5s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 700;
    font-size: clamp(0.72rem, 2.5vw, 0.85rem);
    position: relative;
    overflow: hidden;
    min-width: 0;
    white-space: nowrap;
    padding: 0 0.5rem;
  }
  .progress-bar-inner.complete::after{
    content:"";
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, rgba(255,255,255,0) 40%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0) 60%);
    animation: shimmer 2.2s infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  /* ── Surah List ── */
  .surah-list {
    list-style: none;
    margin: clamp(0.9rem, 3vw, 1.25rem) 0 0;
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 1px solid var(--parchment-deep);
    max-height: 0;
    opacity: 0;
    transition: max-height 0.5s ease, opacity 0.3s ease, margin-top 0.3s ease;
  }
  .surah-list.open {
    max-height: 2000px;
    opacity: 1;
  }
  .surah-list li {
    padding: clamp(0.6rem, 2.5vw, 0.75rem) clamp(0.75rem, 3vw, 1rem);
    border-bottom: 1px solid var(--parchment-deep);
    font-size: clamp(0.88rem, 3.2vw, 0.95rem);
    font-weight: 500;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    transition: background 0.15s ease;
  }
  .surah-list li:last-child { border-bottom: none; }
  @media (hover: hover) {
    .surah-list li:hover { background: #fdfaf2; }
  }
  .surah-list li:active { background: #f8f0d6; }

  .surah-name { flex: 1; min-width: 0; }

  .badge {
    font-size: clamp(0.65rem, 2.2vw, 0.75rem);
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 0.2rem 0.6rem;
    border-radius: 999px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-m { background: var(--gold); color: #fff; }
  .badge-j { background: var(--sage); color: #fff; }
  .badge-empty { background: #eee; color: #999; }

  /* ── Leaderboard ── */
  .leaderboard {
    margin-top: clamp(1.5rem, 4vw, 2rem);
    transition: opacity 0.3s ease, max-height 0.4s ease;
    overflow: hidden;
  }
  .leaderboard.hidden {
    opacity: 0;
    max-height: 0;
    margin-top: 0;
    pointer-events: none;
  }
  .leaderboard-head {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    margin-bottom: 0.15rem;
  }
  .leaderboard-head h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.2rem, 4.5vw, 1.4rem);
    color: var(--ink);
    font-weight: 700;
  }
  #refreshBtn {
    border: none;
    width: 40px;
    height: 40px;
    min-width: 40px;
    border-radius: 50%;
    background: rgba(63,125,88,0.12);
    color: var(--sage);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.4s ease, background 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  #refreshBtn:active { transform: rotate(180deg) scale(0.9); }
  @media (hover: hover) { #refreshBtn:hover { background: rgba(63,125,88,0.22); } }
  #refreshBtn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  #refreshBtn.spinning { animation: spin 0.6s ease; }

  .leaderboard-sub {
    text-align: center;
    font-size: clamp(0.72rem, 2.5vw, 0.8rem);
    color: #8a7f66;
    margin: 0 0 clamp(0.75rem, 2.5vw, 1rem);
    line-height: 1.4;
  }

  .award-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: clamp(0.6rem, 2vw, 0.85rem);
  }

  .award-card {
    background: #fff;
    border-radius: var(--radius);
    padding: clamp(0.7rem, 2.5vw, 0.9rem) clamp(0.7rem, 2.5vw, 1rem);
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    display: flex;
    align-items: center;
    gap: clamp(0.5rem, 2vw, 0.85rem);
    border: 1px solid var(--parchment-deep);
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .award-card:active { transform: scale(0.97); }
  @media (hover: hover) {
    .award-card:hover { transform: translateY(-2px); box-shadow: 0 8px 18px rgba(0,0,0,0.1); }
  }

  .award-card .rank {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: clamp(0.85rem, 3vw, 1rem);
    color: #b3a988;
    width: 1.2rem;
    text-align: center;
    flex-shrink: 0;
  }

  /* Khatam (full Mutqin) — gold card */
  .award-card.khatam {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, #fff8dc, #ffe27a 40%, #fff6da 100%);
    border: 1.5px solid var(--gold-light);
    box-shadow: 0 0 0 1px rgba(201,162,39,0.3), 0 4px 16px rgba(201,162,39,0.3);
    padding: clamp(0.85rem, 3vw, 1.1rem) clamp(0.85rem, 3vw, 1.15rem);
  }
  .award-card.khatam .name { color: #6b4f0a; font-size: clamp(1rem, 3.5vw, 1.1rem); }

  /* Perak (khatam but not full Mutqin) */
  .award-card.perak {
    background: linear-gradient(135deg, #f0f1f3, #fafafa);
    border: 1.5px solid var(--silver);
  }

  /* Shimmer on khatam card */
  .award-card.khatam::before {
    content: "";
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: linear-gradient(120deg, rgba(255,255,255,0) 35%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 65%);
    transform: rotate(25deg);
    animation: shimmer 2.5s infinite;
    pointer-events: none;
  }
  .award-card.khatam::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle, #fff 1px, transparent 1.5px),
      radial-gradient(circle, #fff 1px, transparent 1.5px),
      radial-gradient(circle, #fff 1px, transparent 1.5px);
    background-size: 26px 26px, 34px 34px, 20px 20px;
    background-position: 10% 20%, 70% 60%, 85% 15%;
    opacity: 0;
    animation: twinkle 2.4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; }
    50% { opacity: 0.8; }
  }

  .award-card .seal {
    font-size: clamp(1.3rem, 5vw, 1.7rem);
    flex-shrink: 0;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.12));
  }
  .award-card.khatam .seal {
    animation: sealGlow 1.8s ease-in-out infinite;
  }
  @keyframes sealGlow {
    0%, 100% { filter: drop-shadow(0 0 0 rgba(201,162,39,0)); transform: scale(1); }
    50% { filter: drop-shadow(0 0 5px rgba(230,190,60,0.85)); transform: scale(1.1); }
  }

  .award-card .info { flex: 1; min-width: 0; }
  .award-card .info .name {
    font-size: clamp(0.85rem, 3.2vw, 0.95rem);
    font-weight: 700;
    margin-bottom: 0.2rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .award-card .info .medals {
    font-size: clamp(0.75rem, 2.6vw, 0.82rem);
    display: flex;
    gap: clamp(0.5rem, 2vw, 0.7rem);
    color: #4a4335;
    font-weight: 600;
  }

  .empty-state {
    text-align: center;
    padding: clamp(1.25rem, 4vw, 1.75rem) 1rem;
    color: #9a8f74;
    font-size: clamp(0.85rem, 3vw, 0.9rem);
    font-style: italic;
    line-height: 1.5;
  }

  /* ── Footer watermark ── */
  .footer-mark {
    text-align: center;
    margin-top: clamp(1rem, 3vw, 1.5rem);
    padding-top: 0.75rem;
    border-top: 1px solid var(--parchment-deep);
    font-size: 0.7rem;
    color: #b5a98a;
    letter-spacing: 0.04em;
  }

  /* ── Single column on very narrow screens ── */
  @media (max-width: 340px) {
    .award-grid { grid-template-columns: 1fr; }
    .award-card.khatam { grid-column: auto; }
  }

  /* ── Larger phones / small tablets: keep 2-col but tighter ── */
  @media (min-width: 420px) and (max-width: 599px) {
    .award-grid { gap: 0.7rem; }
  }

  /* ── Desktop refinements ── */
  @media (min-width: 600px) {
    .container { padding: 2.25rem 1.75rem 1.75rem; }
    .award-card { padding: 0.9rem 1rem; }
    .award-card.khatam { padding: 1.1rem 1.15rem; }
  }

  /* ── Reduced motion ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    .container { animation: none; }
    .surah-list { transition: none; }
  }

  /* ── Safe area for notched phones ── */
  @supports (padding: env(safe-area-inset-bottom)) {
    body {
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
    }
  }
</style>
</head>
<body>

<div class="container">
  <!-- Corner ornaments -->
  <div class="corner tl"><svg viewBox="0 0 46 46" fill="none"><path d="M2 2Q2 24 24 24Q2 24 2 44" stroke="#C9A227" stroke-width="1.5"/><circle cx="2" cy="2" r="3" fill="#C9A227"/><path d="M2 2Q24 2 24 24" stroke="#C9A227" stroke-width="1.5"/></svg></div>
  <div class="corner tr"><svg viewBox="0 0 46 46" fill="none"><path d="M2 2Q2 24 24 24Q2 24 2 44" stroke="#C9A227" stroke-width="1.5"/><circle cx="2" cy="2" r="3" fill="#C9A227"/><path d="M2 2Q24 2 24 24" stroke="#C9A227" stroke-width="1.5"/></svg></div>
  <div class="corner bl"><svg viewBox="0 0 46 46" fill="none"><path d="M2 2Q2 24 24 24Q2 24 2 44" stroke="#C9A227" stroke-width="1.5"/><circle cx="2" cy="2" r="3" fill="#C9A227"/><path d="M2 2Q24 2 24 24" stroke="#C9A227" stroke-width="1.5"/></svg></div>
  <div class="corner br"><svg viewBox="0 0 46 46" fill="none"><path d="M2 2Q2 24 24 24Q2 24 2 44" stroke="#C9A227" stroke-width="1.5"/><circle cx="2" cy="2" r="3" fill="#C9A227"/><path d="M2 2Q24 2 24 24" stroke="#C9A227" stroke-width="1.5"/></svg></div>

  <!-- Header -->
  <div class="header">
    <button id="homeBtn" aria-label="Kembali ke ringkasan">
      <img src="masi.svg" alt="Home" style="width:120px;" />
    </button>
    <h2>Hafalan Juz Ke-30 Kelas 12</h2>
    <div style="width:44px;min-width:44px"></div>
  </div>
  <p class="subtitle">MA Syarikat Islam Parakansalak</p>

  <!-- Student selector -->
  <label for="student">Pilih Nama</label>
  <div class="select-wrap">
    <select id="student"><option value="">-- Memuat data... --</option></select>
  </div>

  <!-- Status banner -->
  <div id="statusBanner" class="status-banner" role="status" aria-live="polite"></div>

  <!-- Individual progress (hidden until selection) -->
  <div id="progress" class="progress" style="display:none">
    <div class="progress-text" id="progressText"></div>
    <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
      <div class="progress-bar-inner" id="progressBar"></div>
    </div>
  </div>

  <!-- Surah detail list -->
  <ul id="surahList" class="surah-list" role="list"></ul>

  <!-- Leaderboard -->
  <section class="leaderboard" id="leaderboardSection" aria-label="Papan progres hafalan">
    <div class="leaderboard-head">
      <h3>Progres Hafalan</h3>
      <button id="refreshBtn" aria-label="Muat ulang data">&#8635;</button>
    </div>
    <p class="leaderboard-sub">Diurutkan dari yang paling banyak menyetor hafalan</p>
    <div id="leaderboardList"></div>
  </section>
</div>
<script>
  const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTCWIVJ86dqtkFWkFsgNyULlNqnmXw8__kg1UNKfqepUY4JfEHQEUoU6GlP1uAhKO8oJY3pb52n2R6a/pub?gid=0&single=true&output=csv";

  let students = [];
  let surahHeaders = [];

  /* Robust CSV parser that handles quoted fields with commas */
  function parseCsvLine(line) {
    const result = [];
    let current = "";
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuotes && line[i + 1] === '"') { current += '"'; i++; }
        else { inQuotes = !inQuotes; }
      } else if (ch === "," && !inQuotes) {
        result.push(current);
        current = "";
      } else {
        current += ch;
      }
    }
    result.push(current);
    return result.map(v => v.trim());
  }

  const statusBanner = document.getElementById("statusBanner");
  function setStatus(type, message) {
    const spinner = type === "loading" ? '<span class="spinner"></span>' : '';
    statusBanner.className = "status-banner show " + type;
    statusBanner.innerHTML = spinner + message;
  }
  function clearStatus() {
    statusBanner.className = "status-banner";
    statusBanner.innerHTML = "";
  }

  function fetchData() {
    setStatus("loading", "Memuat data hafalan...");
    fetch(SHEET_URL)
      .then(res => {
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.text();
      })
      .then(csv => {
        const rows = csv.trim().split("\n").map(parseCsvLine);
        surahHeaders = rows[0].slice(1);
        students = rows.slice(1)
          .filter(r => r[0])
          .map(r => {
            const h = r.slice(1).map(v => (v || "").trim());
            const M = h.filter(v => v === "M").length;
            const J = h.filter(v => v === "J").length;
            const total = h.length;
            return {
              name: r[0], hafalan: h, M, J,
              isKhatam: total > 0 && (M + J === total),
              isFullMutqin: total > 0 && M === total
            };
          });
        clearStatus();
        renderSelect();
        renderLeaderboard();
      })
      .catch(err => {
        setStatus("error", "Data tidak dapat dimuat. Periksa koneksi internet, lalu tekan tombol muat ulang.");
        console.error(err);
      });
  }

  function renderSelect() {
    const sel = document.getElementById("student");
    sel.innerHTML = '<option value="">-- Pilih Nama --</option>' +
      students.map((s, i) => `<option value="${i}">${s.name}</option>`).join("");
  }

  function renderLeaderboard() {
    const board = students
      .filter(s => s.M + s.J > 0)
      .sort((a, b) => {
        if (b.isFullMutqin !== a.isFullMutqin) return b.isFullMutqin - a.isFullMutqin;
        if (b.isKhatam !== a.isKhatam) return b.isKhatam - a.isKhatam;
        return (b.M + b.J) - (a.M + a.J) || b.M - a.M;
      });

    const el = document.getElementById("leaderboardList");
    if (!board.length) {
      el.innerHTML = '<div class="empty-state">Belum ada santri yang menyetor hafalan.</div>';
      return;
    }

    el.innerHTML = `<div class="award-grid">${board.map((s, i) => {
      const cls = s.isFullMutqin ? 'khatam' : (s.isKhatam ? 'perak' : '');
      const seal = s.isFullMutqin ? '🏆' : (s.isKhatam ? '🥈' : '📖');
      return `<div class="award-card ${cls}">
        <div class="rank">${i + 1}</div>
        <div class="seal">${seal}</div>
        <div class="info">
          <div class="name">${s.name}</div>
          <div class="medals">
            <span>🥇 ${s.M || '-'}</span>
            <span>🥈 ${s.J || '-'}</span>
          </div>
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  /* When a student is selected, show their detail */
  document.getElementById("student").addEventListener("change", function () {
    const idx = this.value;
    const list = document.getElementById("surahList");
    const progressWrap = document.getElementById("progress");
    const progressText = document.getElementById("progressText");
    const progressBar = document.getElementById("progressBar");
    const bar = progressBar.parentElement;
    const lb = document.getElementById("leaderboardSection");

    /* Reset */
    list.innerHTML = "";
    list.classList.remove("open");
    progressWrap.style.display = "none";
    progressText.textContent = "";
    progressText.classList.remove("red", "green");
    progressBar.style.width = "0%";
    progressBar.textContent = "";
    progressBar.classList.remove("complete");
    progressBar.style.background = "var(--parchment-deep)";
    bar.setAttribute("aria-valuenow", "0");

    if (!idx) {
      lb.classList.remove("hidden");
      return;
    }

    /* Hide leaderboard, show progress */
    lb.classList.add("hidden");
    const siswa = students[idx];
    const total = siswa.hafalan.length;
    const selesai = siswa.hafalan.filter(v => v === "M" || v === "J").length;
    const sisa = total - selesai;
    const persen = total > 0 ? Math.round((selesai / total) * 100) : 0;

    /* Build progress text */
    if (selesai === 0) {
      progressText.textContent = "Belum setor hafalan";
      progressText.classList.add("red");
      progressBar.style.background = "var(--maroon)";
    } else if (persen === 100) {
      progressText.textContent = "Masyaa Allah, semua surat sudah diselesaikan!";
      progressText.classList.add("green");
      progressBar.style.background = "var(--sage)";
      progressBar.classList.add("complete");
    } else {
      progressText.textContent = `Sudah setor ${selesai} surat, sisa ${sisa} surat lagi.`;
      progressBar.style.background = persen > 70 ? "var(--sage)" : persen >= 50 ? "var(--amber)" : "var(--maroon)";
    }

    progressBar.style.width = persen + "%";
    progressBar.textContent = persen + "%";
    bar.setAttribute("aria-valuenow", persen);
    progressWrap.style.display = "block";

    /* Build surah list */
    const frag = document.createDocumentFragment();
    surahHeaders.forEach((surah, i) => {
      const li = document.createElement("li");
      const nameSpan = document.createElement("span");
      nameSpan.className = "surah-name";
      nameSpan.textContent = surah;
      li.appendChild(nameSpan);

      const badge = document.createElement("span");
      badge.className = "badge";
      const val = siswa.hafalan[i];
      if (val === "M") { badge.classList.add("badge-m"); badge.textContent = "Mutqin"; }
      else if (val === "J") { badge.classList.add("badge-j"); badge.textContent = "Jiddan"; }
      else { badge.classList.add("badge-empty"); badge.textContent = "Belum"; }
      li.appendChild(badge);
      frag.appendChild(li);
    });
    list.appendChild(frag);

    /* Animate list open */
    requestAnimationFrame(() => {
      requestAnimationFrame(() => list.classList.add("open"));
    });

    /* Scroll progress into view smoothly */
    progressWrap.scrollIntoView({ behavior: "smooth", block: "nearest" });
  });

  /* Home button: reset to leaderboard */
  document.getElementById("homeBtn").addEventListener("click", () => {
    document.getElementById("student").value = "";
    document.getElementById("student").dispatchEvent(new Event("change"));
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  /* Refresh button */
  document.getElementById("refreshBtn").addEventListener("click", function () {
    this.classList.add("spinning");
    setTimeout(() => this.classList.remove("spinning"), 600);
    fetchData();
    document.getElementById("student").value = "";
    document.getElementById("student").dispatchEvent(new Event("change"));
  });

  /* Initial load */
  fetchData();
</script>
</body>
</html>
